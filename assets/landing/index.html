<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex"><!-- placeholder: no indexar hasta tener el sitio real -->
<title>Distrito Ardora — Próximamente</title>
<style>
  :root{
    --oro:#E0A526; --azul:#1F3A66; --verde:#2F9E6B; --rojo:#D2412F;
    --tinta:#1c2330; --gris:#6b7280; --bg:#ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--tinta);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;-webkit-font-smoothing:antialiased;}
  .card{max-width:560px;text-align:center;}
  .eyebrow{font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;color:var(--gris);font-weight:600;}
  .bars{display:flex;gap:7px;justify-content:center;margin:22px 0 20px;}
  .bars span{width:34px;height:6px;border-radius:3px;display:block;}
  .b1{background:var(--oro);} .b2{background:var(--azul);} .b3{background:var(--verde);} .b4{background:var(--rojo);}
  h1{font-size:clamp(3rem,12vw,5.5rem);font-weight:800;letter-spacing:-.02em;line-height:1;color:var(--azul);}
  .tag{font-size:clamp(1.05rem,3.5vw,1.4rem);color:var(--tinta);margin-top:14px;font-weight:500;}
  .soon{display:inline-block;margin-top:26px;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gris);
        border:1px solid #e5e7eb;border-radius:999px;padding:7px 16px;}
  .meta{margin-top:30px;font-size:.86rem;color:var(--gris);line-height:1.7;}
  .meta a{color:var(--azul);text-decoration:none;font-weight:600;}
  .meta a:hover{text-decoration:underline;}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Distrito Ardora</div>
    <div class="bars"><span class="b1"></span><span class="b2"></span><span class="b3"></span><span class="b4"></span></div>
    <h1>Ardora</h1>
    <p class="tag">Una nueva forma de vivir Ranelagh</p>
    <div class="soon">Próximamente</div>
    <p class="meta">
      Av. Valentín Vergara 3200 · Ranelagh, Berazategui<br>
      Seguinos en <a href="https://instagram.com/ardora.ar" target="_blank" rel="noopener">@ardora.ar</a>
    </p>
  </div>
</body>
</html>
